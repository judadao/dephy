# Dephy ESP32 product profile: keep Ethernet/MQTT/HTTP-capable firmware lean.
#
# Product apps declare required features in their own prj.conf and include this
# file as EXTRA_CONF_FILE from the build system.

# Product firmware uses native Zephyr k_thread/zsock paths, not POSIX wrappers.
CONFIG_POSIX_API=n
CONFIG_POSIX_SYSTEM_INTERFACES=n
CONFIG_NET_SOCKETPAIR=n

# Production product builds do not need Zephyr's boot banner or runtime assert
# formatting. Application errors are still reported through the logging backend.
CONFIG_BOOT_BANNER=n
CONFIG_ASSERT=n
CONFIG_ASSERT_VERBOSE=n

# Keep runtime diagnostics but avoid spending RAM on verbose formatting buffers.
CONFIG_LOG_BUFFER_SIZE=512
CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=768
CONFIG_LOG_BACKEND_SHOW_COLOR=n
CONFIG_LOG_BACKEND_SHOW_TIMESTAMP=n
CONFIG_LOG_FUNC_NAME_PREFIX_DBG=n
CONFIG_LOG_USE_VLA=n

# Network management is only used for Ethernet link/IP events in this product
# class, so the default queue/thread sizing can be smaller.
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=4
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048

# Disable network compatibility paths and metadata that the field bridge does
# not use while keeping TCP, UDP, DHCP, HTTP, MQTT, and P2P behavior intact.
CONFIG_NET_ARP_GRATUITOUS=n
CONFIG_NET_CONTEXT_DSCP_ECN=n
CONFIG_NET_CONTEXT_REUSEPORT=n
CONFIG_NET_SOCKETS_TLS_SET_MAX_FRAGMENT_LENGTH=n

# Match Zephyr's computed minimum for the product network socket table.
CONFIG_ZVFS_OPEN_MAX=17

# Device hostname services are not used by this field bridge product class.
CONFIG_NET_HOSTNAME_ENABLE=n
